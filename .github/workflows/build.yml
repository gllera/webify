name: build

on:
  push:
    branches: [main]
    tags: ['*'] # a tag build also publishes a GitHub Release (see release job)
  pull_request:
  workflow_dispatch:

# the vendor build is expensive — cancel superseded runs of the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm # native arm64 — no qemu emulation

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Same build as ./build.sh, with the BuildKit layer cache persisted in
      # the GitHub Actions cache. Every vendored library has its own Docker
      # stage whose cache key is its own vendor.d/<lib>.sh script, so bumping
      # one library's version/sha256 recompiles only that library (plus the
      # ffmpeg stage that links it); every other library restores from cache.
      - name: Build static binary
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dist
          outputs: type=local,dest=dist
          cache-from: type=gha,scope=webify-${{ matrix.arch }}
          cache-to: type=gha,scope=webify-${{ matrix.arch }},mode=max

      - name: Smoke check
        run: |
          ls -lh dist/webify
          file dist/webify
          ./dist/webify --version

      # tar keeps the executable bit (upload-artifact alone strips it)
      - name: Pack
        run: tar -C dist -czf webify-linux-${{ matrix.arch }}.tar.gz webify

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: webify-linux-${{ matrix.arch }}
          path: webify-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  # On tag builds (pushed tags, or the vendor-update workflow dispatching on
  # the tag it created — GITHUB_TOKEN-pushed tags never fire on:push), attach
  # both arch binaries to a GitHub Release for the tag. needs waits for the
  # whole matrix, so a release only ever ships when both arches built.
  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the release and upload its assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: webify-linux-*
          merge-multiple: true

      - name: Create release and attach binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' -R '${{ github.repository }}' \
              --verify-tag --title '${{ github.ref_name }}' \
              --notes 'Static `webify` binaries (linux amd64 + arm64), vendor state `${{ github.ref_name }}`.' \
            || echo 'release already exists — refreshing assets'
          gh release upload '${{ github.ref_name }}' -R '${{ github.repository }}' --clobber \
              webify-linux-amd64.tar.gz webify-linux-arm64.tar.gz
