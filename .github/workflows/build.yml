name: build

on:
  push:
    branches: [main]
    tags: ['[0-9]*'] # version tags publish a GitHub Release (see release
                     # job); non-version tags (fixtures-*) must not build
  pull_request:
  workflow_dispatch:

# the vendor build is expensive — cancel superseded runs of the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # all the build/test/vendor tooling is shell: lint it at warning severity
  # (style-level nits stay advisory; intentional word splitting carries
  # explicit shellcheck directives in the scripts)
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        run: shellcheck -S warning build.sh test.sh calibrate.sh fixtures.sh vendor.sh update-vendor.sh vendor.d/*.sh

  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            cwebp_arch: x86-64
          - arch: arm64
            runner: ubuntu-24.04-arm # native arm64 — no qemu emulation
            cwebp_arch: aarch64

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Same build as ./build.sh, with the BuildKit layer cache persisted in
      # the GitHub Actions cache. Every vendored library has its own Docker
      # stage whose cache key is its own vendor.d/<lib>.sh script, so bumping
      # one library's version/sha256 recompiles only that library (plus the
      # ffmpeg stage that links it); every other library restores from cache.
      - name: Build static binary
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dist
          outputs: type=local,dest=dist
          cache-from: type=gha,scope=webify-${{ matrix.arch }}
          cache-to: type=gha,scope=webify-${{ matrix.arch }},mode=max
          # release binaries self-identify by their tag; branch/PR builds
          # report "dev" (the Dockerfile default — only the tiny final
          # compile stage rebuilds when this changes)
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}

      - name: Smoke check
        run: |
          ls -lh dist/webify
          file dist/webify
          ./dist/webify --version

      # test.sh byte-compares webify's stills against the real cwebp, so the
      # host cwebp must be the *vendored* libwebp version (the distro package
      # drifts): fetch Google's prebuilt binary matching the vendor.d pin
      - name: Install test suite dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          WEBP_VERSION=$(sed -n 's/^WEBP_VERSION=//p' vendor.d/50-webp.sh)
          curl -fsSL "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-${WEBP_VERSION}-linux-${{ matrix.cwebp_arch }}.tar.gz" \
            | sudo tar -xz -C /usr/local --strip-components=1
          cwebp -version

      # the behavioral suite gates everything downstream: the release job
      # needs this whole matrix, so no release ever ships untested binaries
      - name: Test suite
        run: ./test.sh

      # tar keeps the executable bit (upload-artifact alone strips it)
      - name: Pack
        run: tar -C dist -czf webify-linux-${{ matrix.arch }}.tar.gz webify

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: webify-linux-${{ matrix.arch }}
          path: webify-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  # On tag builds (pushed tags, or the vendor-update workflow dispatching on
  # the tag it created — GITHUB_TOKEN-pushed tags never fire on:push), attach
  # both arch binaries to a GitHub Release for the tag. needs waits for the
  # whole matrix, so a release only ever ships when both arches built.
  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the release and upload its assets
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: webify-linux-*
          merge-multiple: true

      - name: Create release and attach binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' -R '${{ github.repository }}' \
              --verify-tag --title '${{ github.ref_name }}' \
              --notes 'Static `webify` binaries (linux amd64 + arm64), vendor state `${{ github.ref_name }}`.' \
            || echo 'release already exists — refreshing assets'
          gh release upload '${{ github.ref_name }}' -R '${{ github.repository }}' --clobber \
              webify-linux-*.tar.gz
